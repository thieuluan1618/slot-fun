<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 260">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Ankh loop (oval top) -->
  <ellipse cx="150" cy="75" rx="45" ry="55" fill="none" stroke="url(#gold)" stroke-width="18" filter="url(#glow)"/>
  <ellipse cx="150" cy="75" rx="45" ry="55" fill="none" stroke="url(#goldDark)" stroke-width="10"/>
  <!-- Inner loop detail -->
  <ellipse cx="150" cy="75" rx="22" ry="30" fill="#1E3A5F" stroke="#40E0D0" stroke-width="2"/>
  <!-- Crossbar -->
  <rect x="95" y="118" width="110" height="18" rx="4" fill="url(#gold)" stroke="#B8860B" stroke-width="2"/>
  <!-- Turquoise inlays on crossbar -->
  <rect x="105" y="122" width="18" height="10" rx="2" fill="#40E0D0" opacity="0.8"/>
  <rect x="141" y="122" width="18" height="10" rx="2" fill="#40E0D0" opacity="0.8"/>
  <rect x="177" y="122" width="18" height="10" rx="2" fill="#40E0D0" opacity="0.8"/>
  <!-- Vertical shaft -->
  <rect x="138" y="136" width="24" height="105" rx="4" fill="url(#gold)" stroke="#B8860B" stroke-width="2"/>
  <!-- Shaft hieroglyph details -->
  <line x1="150" y1="150" x2="150" y2="230" stroke="#B8860B" stroke-width="1" opacity="0.5"/>
  <circle cx="150" cy="165" r="4" fill="#40E0D0" opacity="0.7"/>
  <circle cx="150" cy="195" r="4" fill="#40E0D0" opacity="0.7"/>
  <circle cx="150" cy="225" r="4" fill="#40E0D0" opacity="0.7"/>
</svg>
